# traider — unified MCP server hub
#
# One image, one service, one port. Which providers are exposed is
# controlled by TRAIDER_PROVIDERS in ./.env. Example:
#
#   TRAIDER_PROVIDERS=schwab,fred,fed-calendar,sec-edgar,factor,treasury,news
#
# Valid provider names: schwab, yahoo, fred, fed-calendar, sec-edgar,
# factor, treasury, news. schwab and yahoo are mutually exclusive
# market-data backends — enabling both at once is an error.
#
# Compose auto-loads ./.env, so no --env-file flag is needed.
#
#   docker compose up -d
#
# First-time Schwab OAuth (only if the schwab provider is active) is an
# interactive one-shot:
#
#   docker compose run --rm traider auth schwab
#
# That writes the token file to ~/.schwab-connector/ on the host and a
# later `docker compose up` reuses it.

name: traider

services:
  traider:
    build:
      context: .
    image: traider:latest
    env_file:
      - ./.env
    environment:
      TRAIDER_LOG_DIR: /app/logs
      # Default token location for the schwab provider. Overridable via
      # SCHWAB_TOKEN_FILE in ./.env if the user stores the token
      # somewhere non-standard.
      SCHWAB_TOKEN_FILE: /tokens/schwab-token.json
      # Factor provider caches Ken French ZIPs here across restarts.
      FACTOR_CACHE_DIR: /cache
      # Framework rules. Seed lives in the image at /app/rules; per-user
      # overrides come in via the bind mount below at
      # /root/.traider/rules.local. The loader merges overrides on top
      # of the seed at startup and logs divergence visibly.
      TRAIDER_RULES_DIR: /app/rules
      TRAIDER_RULES_LOCAL_DIR: /root/.traider/rules.local
    volumes:
      # Schwab OAuth token file (rw — the client rewrites it when the
      # access token refreshes). Host path matches the default the
      # auth flow uses when run outside docker, so the two modes
      # share the same token.
      - ${HOME}/.schwab-connector:/tokens
      # Per-provider log files live under ./logs on the host.
      - ./logs:/app/logs
      # Disk cache for Ken French ZIPs. Persisting across container
      # restarts is the whole point of the cache — without this volume
      # every restart would re-fetch the full set.
      - ${HOME}/.cache/traider-factor:/cache
      # User data dir — intents journal, account profile, per-user
      # rule overrides. One mount surfaces all of ~/.traider/ inside
      # the container at /root/.traider/, which is where every loader
      # in the intent provider looks by default. Override the host
      # path with TRAIDER_HOME in .env if you keep this data
      # elsewhere (encrypted volume, synced folder, …). Docker
      # creates the host dir if missing, so a fresh clone works
      # without any pre-`up` mkdir.
      - ${TRAIDER_HOME:-${HOME}/.traider}:/root/.traider
      # Framework rule files. The Dockerfile COPYs rules/ into the
      # image as a fallback seed, but mounting the host rules/ over
      # /app/rules lets edits propagate without rebuilding — call
      # reload_rules() from the MCP after editing a rule. Comment
      # this line out if you want rules pinned to the image.
      - ./rules:/app/rules:ro
    ports:
      - "8765:8765"
    stdin_open: true
    tty: true
    restart: unless-stopped
